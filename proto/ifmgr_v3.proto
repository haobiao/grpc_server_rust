                uint32 UpTime = 1;
                uint32 DownTime = 2;
            }
            MsgLinkDelay LinkDelay = 32;
            uint32 KeepAlive = 33;
            uint32 KeepAliveRetry = 34;
            string DefaultMac = 35;
            string LastChange = 36;
            string PhyLastChange = 37;
            string TrafficStatisticsEnable = 38;
            string SubIfRateStatisticsEnable = 39;
        }
        repeated MsgInterface Interface = 1;
    }
    MsgInterfaces Interfaces = 1;
    message MsgStatistics {
        message MsgInterface {
            uint32 IfIndex = 1;
            string Name = 2;
            string AbbreviatedName = 3;
            uint64 InOctets = 4;
            uint64 InUcastPkts = 5;
            uint64 InNUcastPkts = 6;
            uint64 InDiscards = 7;
            uint64 InErrors = 8;
            uint64 InUnknownProtos = 9;
            uint64 InRate = 10;
            uint64 OutOctets = 11;
            uint64 OutUcastPkts = 12;
            uint64 OutNUcastPkts = 13;
            uint64 OutDiscards = 14;
            uint64 OutErrors = 15;
            uint64 OutRate = 16;
            string LastClear = 17;
            uint64 InPkts = 18;
            uint64 OutPkts = 19;
            uint64 InPktRate = 20;
            uint64 OutPktRate = 21;
        }
        repeated MsgInterface Interface = 1;
    }
    MsgStatistics Statistics = 2;
    message MsgTrafficStatistics {
        message MsgInterfaces {
            message MsgInterface {
                uint32 IfIndex = 1;
                string Name = 2;
                uint32 Interval = 3;
                uint64 InPkts = 4;
                uint64 OutPkts = 5;
                uint64 InOctets = 6;
                uint64 OutOctets = 7;
                uint64 InBits = 8;
                uint64 OutBits = 9;
            }
            repeated MsgInterface Interface = 1;
        }
        MsgInterfaces Interfaces = 1;
        message MsgInterval {
            bool Configurable = 1;
            uint32 Interval = 2;
        }
        MsgInterval Interval = 2;
    }
    MsgTrafficStatistics TrafficStatistics = 3;
    message MsgPorts {
        message MsgPort {
            uint32 PortIndex = 1;
            string Name = 2;
            uint32 IfIndex = 3;
        }
        repeated MsgPort Port = 1;
    }
    MsgPorts Ports = 4;
    message MsgInterfaceCapabilities {
        message MsgInterface {
            uint32 IfIndex = 1;
            bool Configurable = 2;
            bool Shutdown = 3;
            uint64 Speed = 4;
            uint64 AutoSpeed = 5;
            uint32 Duplex = 6;
            bool PortLayer = 7;
            bool Loopback = 8;
            uint32 MDI = 9;
            bool Bandwidth = 10;
            uint32 MinMTU = 11;
            uint32 MaxMTU = 12;
            uint32 MinSubNum = 13;
            uint32 MaxSubNum = 14;
            uint32 MaxCreateSubNum = 15;
            uint32 ContextAllocType = 16;
            bool Removable = 17;
            bool Interval = 18;
            bool ForceUP = 19;
            bool LoopbackAutoStop = 20;
            bool MAC = 21;
            bool TrafficStatisticsEnable = 22;
            bool SubIfRateStatisticsEnable = 23;
            string IfName = 24;
        }
        repeated MsgInterface Interface = 1;
    }
    MsgInterfaceCapabilities InterfaceCapabilities = 5;
    message MsgTypeCapabilities {
        message MsgCapability {
            uint32 IfTypeExt = 1;
            uint32 MinNum = 2;
            uint32 MaxNum = 3;
            uint32 MinSubNum = 4;
            uint32 MaxSubNum = 5;
            uint32 MaxCreateNum = 6;
            uint32 MaxCreateSubNum = 7;
            bool MAC = 8;
            bool VlanTm = 9;
        }
        repeated MsgCapability Capability = 1;
    }
    MsgTypeCapabilities TypeCapabilities = 6;
    message MsgEthInterfaces {
        message MsgInterface {
            uint32 IfIndex = 1;
            uint32 Combo = 2;
            uint32 FlowControl = 3;
            bool AutoPowerDown = 4;
            uint32 Jumboframe = 5;
