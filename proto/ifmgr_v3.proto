            message MsgInterface {
                uint32 IfIndex = 1;
                uint32 FreeBuf = 2;
                uint32 InitBuf = 3;
                uint32 MinBuf = 4;
                uint64 MissPkts = 5;
                string IfName = 6;
            }
            repeated MsgInterface Interface = 1;
        }
	MsgIfBuffer IfBuffer = 1;
    }
    MsgDataBuffer DataBuffer = 16;
    message MsgEthPortStatistics {
        message MsgInterface {
            uint32 IfIndex = 1;
            string Name = 2;
            uint64 InBytes = 3;
