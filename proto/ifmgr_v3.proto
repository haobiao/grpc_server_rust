                    uint32 Unit = 3;
                    uint32 Forward = 4;
                    uint32 SwitchNum = 5;
                }
                MsgMulticast Multicast = 6;
                message MsgUnknownUnicast {
                    uint32 Upper = 1;
                    uint32 Lower = 2;
                    uint32 Unit = 3;
                    uint32 Forward = 4;
                    uint32 SwitchNum = 5;
                }
                MsgUnknownUnicast UnknownUnicast = 7;
                message MsgKnownUnicast {
                    uint32 Upper = 1;
                    uint32 Lower = 2;
                    uint32 Unit = 3;
                    uint32 Forward = 4;
                    uint32 SwitchNum = 5;
                }
                MsgKnownUnicast KnownUnicast = 8;
                string IfName = 9;
            }
            repeated MsgInterface Interface = 1;
        }
        MsgInterfaces Interfaces = 1;
        message MsgInterval {
            uint32 Interval = 1;
        }
        MsgInterval Interval = 2;
    }
    MsgStormConstrain StormConstrain = 9;
    message MsgPortIsolation {
        message MsgGroups {
            message MsgGroup {
                uint32 IsolatedGroupID = 1;
                string InterfaceList = 2;
            }
            repeated MsgGroup Group = 1;
        }
        MsgGroups Groups = 1;
        message MsgInterfaces {
            message MsgInterface {
                uint32 IfIndex = 1;
                uint32 IsolatedGroupID = 2;
                string IfName = 3;
            }
            repeated MsgInterface Interface = 1;
        }
        MsgInterfaces Interfaces = 2;
        message MsgCapabilities {
            uint32 MaxGroupNum = 1;
        }
        MsgCapabilities Capabilities = 3;
    }
    MsgPortIsolation PortIsolation = 10;
    message MsgIfHistoryTrafficStatistics {
        message MsgTrafficStatistics {
            uint32 IfIndex = 1;
            uint32 Interval = 2;
            string TimeStamp = 3;
            uint64 InOctets = 4;
            uint64 OutOctets = 5;
            string IfName = 6;
        }
        repeated MsgTrafficStatistics TrafficStatistics = 1;
    }
    MsgIfHistoryTrafficStatistics IfHistoryTrafficStatistics = 11;
    message MsgAllHistoryTrafficStatistics {
        message MsgTrafficStatistics {
            uint32 Interval = 1;
            string TimeStamp = 2;
            uint64 InOctets = 3;
            uint64 OutOctets = 4;
        }
        repeated MsgTrafficStatistics TrafficStatistics = 1;
    }
    MsgAllHistoryTrafficStatistics AllHistoryTrafficStatistics = 12;
    message MsgDeviceCapabilities {
        bool HistoryTrafficStatistic = 1;
        bool ManualNoLoopBack = 2;
        bool DefaultShutdown = 3;
    }
    MsgDeviceCapabilities DeviceCapabilities = 13;
    message MsgNewSubInterfaces {
        message MsgInterface {
            uint32 IfIndex = 1;
            uint32 SubNum = 2;
            string IfName = 3;
        }
        repeated MsgInterface Interface = 1;
    }
    MsgNewSubInterfaces NewSubInterfaces = 14;
    message MsgReserveVlanInterface {
        message MsgVlanInterface {
            uint32 Type = 1;
            string VlanList = 2;
        }
        repeated MsgVlanInterface VlanInterface = 1;
    }
    MsgReserveVlanInterface ReserveVlanInterface = 15;
    message MsgDataBuffer {
