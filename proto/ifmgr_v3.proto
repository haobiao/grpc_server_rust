                uint32 ConfigValue = 1;
                uint32 ActualValue = 2;
                uint32 Unit = 3;
            }
            MsgBroadcastSuppression BroadcastSuppression = 6;
            message MsgMulticastSuppression {
                uint32 ConfigValue = 1;
                uint32 ActualValue = 2;
                uint32 Unit = 3;
                uint32 Flag = 4;
            }
            MsgMulticastSuppression MulticastSuppression = 7;
            message MsgUnknownUnicastSuppression {
                uint32 ConfigValue = 1;
                uint32 ActualValue = 2;
                uint32 Unit = 3;
            }
            MsgUnknownUnicastSuppression UnknownUnicastSuppression = 8;
            bool BPDUDrop = 9;
            bool EEE = 10;
            uint32 ConnectMode = 11;
            string IfName = 12;
            uint32 FiberOrCopper = 13;
        }
        repeated MsgInterface Interface = 1;
    }
    MsgEthInterfaces EthInterfaces = 7;
    message MsgEthInterfaceCapabilities {
        message MsgInterface {
            uint32 IfIndex = 1;
            bool Combo = 2;
            bool StormConstrain = 3;
            bool FlowControl = 4;
            bool AutoPowerDown = 5;
