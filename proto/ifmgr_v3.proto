        uint64 FFPDrop = 2;
        uint64 STPDrop = 3;
        uint64 RateLimitDrop = 4;
        uint64 BroadcastBuppressionDrop = 5;
        uint64 UnicastBuppressionDrop = 6;
        uint64 MulticastSuppressionDrop = 7;
