syntax = "proto3";
package  ifmgr_v3;
message Ifmgr {
    message MsgInterfaces {
        message MsgInterface {
            uint32 IfIndex = 1;
            string Name = 2;
            string AbbreviatedName = 3;
            uint32 PortIndex = 4;
            uint32 ifTypeExt = 5;
            uint32 ifType = 6;
            string Description = 7;
            uint32 AdminStatus = 8;
            uint32 OperStatus = 9;
            uint64 ConfigSpeed = 10;
            uint64 ActualSpeed = 11;
            uint32 ConfigDuplex = 12;
            uint32 ActualDuplex = 13;
            uint32 PortLayer = 14;
            uint32 LinkType = 15;
            uint32 PVID = 16;
            string InetAddressIPV4 = 17;
            string InetAddressIPV4Mask = 18;
            uint32 PhysicalIndex = 19;
            string MAC = 20;
            uint32 ForwardingAttributes = 21;
            uint32 Loopback = 22;
            uint32 MDI = 23;
            uint32 ConfigMTU = 24;
            uint32 ActualMTU = 25;
            uint64 ConfigBandwidth = 26;
            uint64 ActualBandwidth = 27;
            bool SubPort = 28;
            uint32 Interval = 29;
            bool ForceUP = 30;
            uint64 Actual64Bandwidth = 31;
