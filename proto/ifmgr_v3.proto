            bool EEE = 9;
            bool ConnectMode = 10;
            string IfName = 11;
        }
        repeated MsgInterface Interface = 1;
    }
    MsgEthInterfaceCapabilities EthInterfaceCapabilities = 8;
    message MsgStormConstrain {
        message MsgInterfaces {
            message MsgInterface {
                uint32 IfIndex = 1;
                uint32 CtlMode = 2;
                bool Trap = 3;
                bool Log = 4;
                message MsgBroadcast {
                    uint32 Upper = 1;
