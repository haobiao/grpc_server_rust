syntax = "proto3";
package  ipv4_v3;
message ipv4 {
    message Addresses {
        message Address {
            string ip = 1;
            message Config {
                string ip = 1;
                uint32 prefix_length = 2;
            }
            Config config = 2;
        }
        repeated Address address = 1;
    }
    Addresses addresses = 1;
    message Config {
        bool enabled = 1;
    }
    Config config = 2;
}
