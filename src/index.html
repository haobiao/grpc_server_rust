<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gRPC Dialout Server</title>
    <style>
        /* ═══════════════════════════════════════════════════════════
           Design Tokens — CSS Variables
           ═══════════════════════════════════════════════════════════ */
        :root {
            /* Typography */
            --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;

            /* Spacing (8pt grid) */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;

            /* Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-full: 9999px;

            /* Motion */
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur-fast: 150ms;
            --dur-med: 300ms;

            /* Status colors */
            --color-success: #16A34A;
            --color-warn: #F59E0B;
            --color-error: #EF4444;
            --color-info: #3B82F6;
        }

        /* ── Dark Theme (Tokyo Night inspired) ── */
        [data-theme="dark"] {
            --bg-base: #1A1B26;
            --bg-surface: #16161E;
            --bg-elevated: #24283B;
            --bg-hover: #292E42;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text-primary: #C0CAF5;
            --text-secondary: #9AA5CE;
            --text-tertiary: #565F89;
            --accent: #7AA2F7;
            --accent-hover: #89B4FA;
            --accent-subtle: rgba(122, 162, 247, 0.12);
            --accent-secondary: #BB9AF7;
            --accent-warm: #FF9E64;
            --danger: #F7768E;
            --success: #9ECE6A;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.4);
            --statusbar-bg: #7AA2F7;
            --statusbar-fg: #16161E;
            --log-bg: #13141F;
            --log-error: #F7768E;
            --log-warn: #FF9E64;
            --log-info: #C0CAF5;
            --log-debug: #7DCFFF;
            --log-timestamp: #565F89;
        }

        /* ── Light Theme (Arctic Glass inspired) ── */
        [data-theme="light"] {
            --bg-base: #F8FAFC;
            --bg-surface: #FFFFFF;
            --bg-elevated: #F1F5F9;
            --bg-hover: #E2E8F0;
            --border: rgba(15, 23, 42, 0.08);
            --border-strong: rgba(15, 23, 42, 0.15);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-tertiary: #94A3B8;
            --accent: #0EA5E9;
            --accent-hover: #0284C7;
            --accent-subtle: rgba(14, 165, 233, 0.08);
            --accent-secondary: #8B5CF6;
            --accent-warm: #F59E0B;
            --danger: #EF4444;
            --success: #22C55E;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.10);
            --statusbar-bg: #0EA5E9;
            --statusbar-fg: #FFFFFF;
            --log-bg: #FAFBFC;
            --log-error: #DC2626;
            --log-warn: #D97706;
            --log-info: #334155;
            --log-debug: #0284C7;
            --log-timestamp: #94A3B8;
        }

        /* ═══════════════════════════════════════════════════════════
           Reset & Base
           ═══════════════════════════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background var(--dur-med) var(--ease-standard),
                        color var(--dur-med) var(--ease-standard);
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════════════════════════
           Top Bar
           ═══════════════════════════════════════════════════════════ */
        .topbar {
            display: flex;
            align-items: center;
            gap: var(--space-5);
            padding: var(--space-3) var(--space-6);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-shrink: 0;
        }

        .brand__icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: var(--radius-md);
            display: grid;
            place-items: center;
            font-size: 18px;
            color: white;
            box-shadow: 0 2px 8px var(--accent-subtle);
        }

        .brand__title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .brand__subtitle {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            flex-wrap: wrap;
            flex: 1;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
        }

        .field__label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .select, .input-port {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            padding: var(--space-2) var(--space-3);
            font-size: 13px;
            font-family: var(--font-display);
            font-weight: 500;
            transition: all var(--dur-fast) var(--ease-standard);
            outline: none;
        }

        .select { cursor: pointer; min-width: 160px; }
        .select:focus, .input-port:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .input-port { width: 90px; }

        /* Toggle chips */
        .chips {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-2) var(--space-3);
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            transition: all var(--dur-fast) var(--ease-standard);
        }

        .chip:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .chip[data-active="true"] {
            background: var(--accent-subtle);
            border-color: var(--accent);
            color: var(--accent);
        }

        .chip input { display: none; }

        /* Action buttons */
        .actions {
            display: flex;
            gap: var(--space-2);
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            height: 38px;
            padding: 0 var(--space-5);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
            border: none;
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease-standard);
            white-space: nowrap;
        }

        .btn:active:not(:disabled) { transform: scale(0.97); }

        .btn--primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
            box-shadow: 0 2px 8px var(--accent-subtle);
        }
        .btn--primary:hover:not(:disabled) {
            filter: brightness(1.1);
            box-shadow: 0 4px 16px var(--accent-subtle);
        }

        .btn--danger {
            background: var(--danger);
            color: white;
        }
        .btn--danger:hover:not(:disabled) { filter: brightness(1.1); }

        .btn--ghost {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-strong);
        }
        .btn--ghost:hover:not(:disabled) {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Theme toggle */
        .theme-btn {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 16px;
            transition: all var(--dur-fast) var(--ease-standard);
            flex-shrink: 0;
        }
        .theme-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            transform: rotate(15deg);
        }

        /* ═══════════════════════════════════════════════════════════
           Stats Row
           ═══════════════════════════════════════════════════════════ */
        .stats {
            display: flex;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-6);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            min-width: 0;
            transition: border-color var(--dur-fast);
        }

        .stat-card:hover {
            border-color: var(--accent);
        }

        .stat-card__icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: grid;
            place-items: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .stat-card__icon--msg { background: rgba(122,162,247,0.12); }
        .stat-card__icon--time { background: rgba(187,154,247,0.12); }
        .stat-card__icon--addr { background: rgba(157,206,106,0.12); }
        .stat-card__icon--status { background: rgba(255,158,100,0.12); }

        .stat-card__info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .stat-card__label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-card__value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ═══════════════════════════════════════════════════════════
           Log Area
           ═══════════════════════════════════════════════════════════ */
        .log-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--log-bg);
            border-top: 1px solid var(--border);
        }

        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-2) var(--space-6);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .log-header__title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .log-header__actions {
            display: flex;
            gap: var(--space-2);
            align-items: center;
        }

        .log-search {
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-full);
            padding: var(--space-1) var(--space-3);
            color: var(--text-primary);
            font-size: 12px;
            font-family: var(--font-display);
            outline: none;
            width: 180px;
            transition: all var(--dur-fast);
        }

        .log-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .icon-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all var(--dur-fast);
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }

        .log-output {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-2) 0;
            font-family: var(--font-mono);
            font-size: 12.5px;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .log-output::-webkit-scrollbar { width: 8px; }
        .log-output::-webkit-scrollbar-track { background: transparent; }
        .log-output::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: var(--radius-full);
        }
        .log-output::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        .log-line {
            display: flex;
            gap: var(--space-2);
            padding: 1px var(--space-6);
            transition: background var(--dur-fast);
        }

        .log-line:hover { background: var(--accent-subtle); }

        .log-line__time {
            color: var(--log-timestamp);
            flex-shrink: 0;
            font-size: 11px;
            width: 60px;
        }

        .log-line__level {
            flex-shrink: 0;
            font-weight: 700;
            font-size: 10px;
            width: 40px;
            text-align: center;
            border-radius: var(--radius-sm);
            padding: 0 2px;
        }

        .log-line--INFO .log-line__level { color: var(--log-info); }
        .log-line--WARN .log-line__level { color: var(--log-warn); }
        .log-line--ERROR .log-line__level { color: var(--log-error); }
        .log-line--DEBUG .log-line__level { color: var(--log-debug); }

        .log-line__text {
            color: var(--log-info);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .log-line--ERROR .log-line__text { color: var(--log-error); }
        .log-line--WARN .log-line__text { color: var(--log-warn); }
        .log-line--DEBUG .log-line__text { color: var(--log-debug); }

        /* ═══════════════════════════════════════════════════════════
           Status Bar
           ═══════════════════════════════════════════════════════════ */
        .statusbar {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-2) var(--space-6);
            background: var(--statusbar-bg);
            color: var(--statusbar-fg);
            font-size: 12px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .statusbar__dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .statusbar__dot--running {
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ═══════════════════════════════════════════════════════════
           Responsive
           ═══════════════════════════════════════════════════════════ */
        @media (max-width: 840px) {
            .stats { overflow-x: auto; padding: var(--space-2) var(--space-4); }
            .stat-card { flex-shrink: 0; }
            .log-search { width: 100px; }
            .toolbar { gap: var(--space-2); }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- ═══ Top Bar ═══ -->
    <div class="topbar">
        <div class="brand">
            <div class="brand__icon">◈</div>
            <div>
                <div class="brand__title">gRPC Dialout Server</div>
                <div class="brand__subtitle">v3.0.7 Telemetry Collector</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="field">
                <span class="field__label">模式</span>
                <select class="select" id="mode">
                    <option value="normal">gRPC 2-layer (JSON)</option>
                    <option value="gpb">gRPC 3-layer (GPB)</option>
                    <option value="gnmi">gRPC gNMI</option>
                    <option value="udp">UDP 2-layer</option>
                </select>
            </div>

            <div class="field">
                <span class="field__label">端口</span>
                <input type="number" class="input-port" id="port" value="50051" min="1" max="65535" />
            </div>

            <div class="field">
                <span class="field__label">选项</span>
                <div class="chips">
                    <label class="chip" data-active="false">
                        <input type="checkbox" id="tls"> TLS
                    </label>
                    <label class="chip" data-active="false">
                        <input type="checkbox" id="orignal"> 原始消息
                    </label>
                    <label class="chip" data-active="true">
                        <input type="checkbox" id="format" checked> 格式化
                    </label>
                    <label class="chip" data-active="false">
                        <input type="checkbox" id="perf"> 性能模式
                    </label>
                </div>
            </div>

            <div class="field">
                <span class="field__label">日志文件</span>
                <div class="chips">
                    <label class="chip" data-active="false">
                        <input type="checkbox" id="log-file"> 保存日志
                    </label>
                    <label class="chip" data-active="false" id="chip-onlylog" style="opacity:0.4;pointer-events:none">
                        <input type="checkbox" id="only-log"> 仅文件
                    </label>
                    <select class="select" id="log-size" style="min-width:auto;font-size:12px;padding:6px 8px;" title="单个日志文件最大大小">
                        <option value="50">50 MB</option>
                        <option value="100" selected>100 MB</option>
                        <option value="200">200 MB</option>
                        <option value="500">500 MB</option>
                    </select>
                    <select class="select" id="log-num" style="min-width:auto;font-size:12px;padding:6px 8px;" title="最大日志文件数量">
                        <option value="10">10 个</option>
                        <option value="50" selected>50 个</option>
                        <option value="100">100 个</option>
                        <option value="200">200 个</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn--primary" id="btn-start">▶ 开始采集</button>
            <button class="btn btn--danger" id="btn-stop" disabled>■ 停止</button>
        </div>

        <button class="theme-btn" id="theme-toggle" title="切换主题">🌙</button>
    </div>

    <!-- ═══ Stats Row ═══ -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--status" id="stat-status-icon">⏸</div>
            <div class="stat-card__info">
                <span class="stat-card__label">状态</span>
                <span class="stat-card__value" id="stat-status">就绪</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--msg">📩</div>
            <div class="stat-card__info">
                <span class="stat-card__label">消息总数</span>
                <span class="stat-card__value" id="stat-msg-count">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--time">⏱</div>
            <div class="stat-card__info">
                <span class="stat-card__label">运行时间</span>
                <span class="stat-card__value" id="stat-uptime">00:00:00</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--addr">📡</div>
            <div class="stat-card__info">
                <span class="stat-card__label">监听地址</span>
                <span class="stat-card__value" id="stat-addr">—</span>
            </div>
        </div>
    </div>

    <!-- ═══ Log Area ═══ -->
    <div class="log-container">
        <div class="log-header">
            <span class="log-header__title">日志输出</span>
            <div class="log-header__actions">
                <input type="text" class="log-search" id="log-search" placeholder="搜索日志…" />
                <button class="icon-btn" id="btn-scroll" title="自动滚动">▼</button>
                <button class="icon-btn" id="btn-clear" title="清空日志">✕</button>
            </div>
        </div>
        <div class="log-output" id="log-area"></div>
    </div>

    <!-- ═══ Status Bar ═══ -->
    <div class="statusbar" id="statusbar">
        <span class="statusbar__dot" id="status-dot"></span>
        <span id="status-text">就绪</span>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;

        // ── State ──
        const logArea = document.getElementById('log-area');
        const MAX_LINES = 5000;
        let logLines = [];
        let autoScroll = true;
        let isRunning = false;
        let startTime = null;
        let uptimeTimer = null;
        let msgCount = 0;

        // ── DOM refs ──
        const els = {
            mode: document.getElementById('mode'),
            port: document.getElementById('port'),
            tls: document.getElementById('tls'),
            orignal: document.getElementById('orignal'),
            format: document.getElementById('format'),
            perf: document.getElementById('perf'),
            logFile: document.getElementById('log-file'),
            onlyLog: document.getElementById('only-log'),
            logSize: document.getElementById('log-size'),
            logNum: document.getElementById('log-num'),
            btnStart: document.getElementById('btn-start'),
            btnStop: document.getElementById('btn-stop'),
            btnClear: document.getElementById('btn-clear'),
            btnScroll: document.getElementById('btn-scroll'),
            themeToggle: document.getElementById('theme-toggle'),
            logSearch: document.getElementById('log-search'),
            statStatus: document.getElementById('stat-status'),
            statStatusIcon: document.getElementById('stat-status-icon'),
            statMsgCount: document.getElementById('stat-msg-count'),
            statUptime: document.getElementById('stat-uptime'),
            statAddr: document.getElementById('stat-addr'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text'),
        };

        // ── Chip toggle ──
        document.querySelectorAll('.chip input').forEach(input => {
            const chip = input.closest('.chip');
            const sync = () => { chip.dataset.active = input.checked; };
            sync();
            input.addEventListener('change', sync);
        });

        // ── Log file toggle enables/disables "仅文件" ──
        els.logFile.addEventListener('change', () => {
            const chipOnlyLog = document.getElementById('chip-onlylog');
            if (els.logFile.checked) {
                chipOnlyLog.style.opacity = '1';
                chipOnlyLog.style.pointerEvents = 'auto';
            } else {
                chipOnlyLog.style.opacity = '0.4';
                chipOnlyLog.style.pointerEvents = 'none';
                els.onlyLog.checked = false;
                chipOnlyLog.dataset.active = 'false';
            }
        });

        // ── Theme toggle ──
        els.themeToggle.addEventListener('click', () => {
            const cur = document.body.dataset.theme;
            const next = cur === 'dark' ? 'light' : 'dark';
            document.body.dataset.theme = next;
            els.themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
        });

        // ── Auto-scroll toggle ──
        els.btnScroll.addEventListener('click', () => {
            autoScroll = !autoScroll;
            els.btnScroll.style.opacity = autoScroll ? '1' : '0.4';
        });

        // ── Log rendering ──
        function parseLogLevel(text) {
            if (text.includes('ERROR') || text.includes('error:')) return 'ERROR';
            if (text.includes('WARN')) return 'WARN';
            if (text.includes('DEBUG')) return 'DEBUG';
            return 'INFO';
        }

        function formatTime() {
            const d = new Date();
            return d.toLocaleTimeString('zh-CN', { hour12: false });
        }

        function appendLog(text) {
            const level = parseLogLevel(text);
            const time = formatTime();

            logLines.push({ time, level, text });

            if (logLines.length > MAX_LINES) {
                logLines = logLines.slice(-MAX_LINES);
                renderAllLogs();
            } else {
                appendLogDom(time, level, text);
            }

            // Extract message count from log content
            const countMatch = text.match(/count:\s*(\d+)/i);
            if (countMatch) {
                msgCount = Math.max(msgCount, parseInt(countMatch[1]));
            }

            if (autoScroll) {
                logArea.scrollTop = logArea.scrollHeight;
            }
        }

        function appendLogDom(time, level, text) {
            const filter = els.logSearch.value.trim().toLowerCase();
            if (filter && !text.toLowerCase().includes(filter)) return;

            const div = document.createElement('div');
            div.className = `log-line log-line--${level}`;

            const timeEl = document.createElement('span');
            timeEl.className = 'log-line__time';
            timeEl.textContent = time;

            const levelEl = document.createElement('span');
            levelEl.className = 'log-line__level';
            levelEl.textContent = level;

            const textEl = document.createElement('span');
            textEl.className = 'log-line__text';
            textEl.textContent = text;

            div.append(timeEl, levelEl, textEl);
            logArea.appendChild(div);
        }

        function renderAllLogs() {
            logArea.innerHTML = '';
            for (const entry of logLines) {
                appendLogDom(entry.time, entry.level, entry.text);
            }
            if (autoScroll) {
                logArea.scrollTop = logArea.scrollHeight;
            }
        }

        // ── Search filter ──
        els.logSearch.addEventListener('input', () => renderAllLogs());

        // ── Clear ──
        els.btnClear.addEventListener('click', () => {
            logLines = [];
            msgCount = 0;
            els.statMsgCount.textContent = '0';
            logArea.innerHTML = '';
        });

        // ── Uptime ──
        function startUptime() {
            startTime = Date.now();
            uptimeTimer = setInterval(() => {
                const secs = Math.floor((Date.now() - startTime) / 1000);
                const h = String(Math.floor(secs / 3600)).padStart(2, '0');
                const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
                const s = String(secs % 60).padStart(2, '0');
                els.statUptime.textContent = `${h}:${m}:${s}`;
            }, 1000);
        }

        function stopUptime() {
            if (uptimeTimer) {
                clearInterval(uptimeTimer);
                uptimeTimer = null;
            }
        }

        // ── Server controls ──
        els.btnStart.addEventListener('click', async () => {
            const mode = els.mode.value;
            const port = parseInt(els.port.value);
            const tls = els.tls.checked;
            const orignal = els.orignal.checked;
            const format = els.format.checked;
            const perf = els.perf.checked;
            const logFile = els.logFile.checked;
            const onlyLog = els.onlyLog.checked;
            const logSize = parseInt(els.logSize.value);
            const logNum = parseInt(els.logNum.value);

            try {
                await invoke('start_server', {
                    config: {
                        mode, port, tls, orignal,
                        formatJson: format, performanceMode: perf,
                        logOutput: logFile, onlyLogFile: onlyLog,
                        logfileSize: logSize, logfileNum: logNum
                    }
                });
                isRunning = true;
                msgCount = 0;
                els.btnStart.disabled = true;
                els.btnStop.disabled = false;
                els.statStatus.textContent = '运行中';
                els.statStatusIcon.textContent = '▶';
                els.statAddr.textContent = `0.0.0.0:${port}`;
                els.statusDot.classList.add('statusbar__dot--running');
                els.statusText.textContent = `运行中 — ${mode.toUpperCase()} — :${port}`;
                startUptime();
            } catch (e) {
                appendLog(`启动失败: ${e}`);
                els.statStatus.textContent = '错误';
                els.statStatusIcon.textContent = '⚠';
            }
        });

        els.btnStop.addEventListener('click', async () => {
            try {
                await invoke('stop_server');
                isRunning = false;
                els.btnStart.disabled = false;
                els.btnStop.disabled = true;
                els.statStatus.textContent = '已停止';
                els.statStatusIcon.textContent = '⏸';
                els.statusDot.classList.remove('statusbar__dot--running');
                els.statusText.textContent = '已停止';
                stopUptime();
            } catch (e) {
                appendLog(`停止失败: ${e}`);
            }
        });

        // ── Poll stats every 2s ──
        setInterval(async () => {
            try {
                const stats = await invoke('get_stats');
                els.statMsgCount.textContent = stats.message_count.toLocaleString();
                if (stats.is_running) {
                    const h = String(Math.floor(stats.uptime_secs / 3600)).padStart(2, '0');
                    const m = String(Math.floor((stats.uptime_secs % 3600) / 60)).padStart(2, '0');
                    const s = String(stats.uptime_secs % 60).padStart(2, '0');
                    els.statUptime.textContent = `${h}:${m}:${s}`;
                }
            } catch(e) { /* ignore */ }
        }, 2000);

        // ── Listen for backend log events ──
        listen('log-line', (event) => {
            appendLog(event.payload);
        });

        // ── Init ──
        appendLog('gRPC Dialout Server GUI 已就绪');
        appendLog('选择模式和端口后点击「开始采集」');
    </script>
</body>
</html>
