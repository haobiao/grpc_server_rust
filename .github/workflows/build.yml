# ────────────────────────────────────────────────────────────────────
# Build CI: 编译 Windows exe（Rust CLI + Tauri GUI）
# ────────────────────────────────────────────────────────────────────
name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:       # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 3
  RUSTUP_MAX_RETRIES: 3

# 取消同一分支/PR 上的旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════════
  # Job 1: 编译纯 Rust CLI 后端 (grpc-server-rust.exe)
  # ══════════════════════════════════════════════════════════════════
  build-cli:
    name: Rust CLI (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # ── Rust 依赖缓存（统一由 rust-cache 管理）─────────────────
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-all-crates: "true"
          prefix-key: "cli-windows-v3"

      - name: Build release binary (CI profile)
        run: |
          cargo build --profile ci --bins --manifest-path src-tauri/Cargo.toml
          echo "CLI binary size:"
          (Get-Item target/ci/grpc-server-rust.exe).Length / 1MB

      - name: Prepare CLI artifact
        run: |
          mkdir artifacts-cli
          # 可执行文件（重命名为 CLI 专用名）
          cp target/ci/grpc-server-rust.exe artifacts-cli/grpc-dialout-cli.exe
          # 打包 proto 和 tls 目录（运行时需要）
          xcopy /E /I /Y proto artifacts-cli\proto
          xcopy /E /I /Y tls  artifacts-cli\tls
          mkdir artifacts-cli\autogen
          # 版本信息
          echo "Version: ${{ github.ref_name }}" > artifacts-cli\VERSION.txt
          echo "Build date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> artifacts-cli\VERSION.txt
          echo "Commit: ${{ github.sha }}" >> artifacts-cli\VERSION.txt

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpc-server-rust-cli-windows
          path: artifacts-cli/
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════
  # Job 2: 编译 Tauri GUI 桌面应用 (Windows NSIS 安装包)
  # ══════════════════════════════════════════════════════════════════
  build-gui:
    name: Tauri GUI (windows-latest)
    runs-on: windows-latest
    needs: []   # 与 CLI 并行构建
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust 工具链 + 统一缓存（rust-cache 管理 registry + bin）──
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-all-crates: "true"
          cache-bin: "true"
          prefix-key: "gui-windows-v3"

      - name: Install Tauri CLI (cached by rust-cache bin)
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (CI profile, no bundle)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cd src-tauri && cargo build --features gui --profile ci

      - name: Rename GUI exe
        run: |
          cp target/ci/grpc-server-rust.exe target/ci/grpc-dialout-gui.exe

      - name: Upload GUI standalone exe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grpc-server-rust-gui-windows
          path: |
            target/ci/grpc-dialout-gui.exe
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════
  # Job 3: 创建 GitHub Release（仅在推送 tag 时运行）
  # ══════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-cli, build-gui]
    permissions:
      contents: write
    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: grpc-server-rust-cli-windows
          path: release-assets/

      - name: Download GUI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: grpc-server-rust-gui*
          path: release-gui/
          merge-multiple: true

      - name: Package release assets
        run: |
          # CLI 压缩包
          cd release-assets
          zip -r ../grpc-server-rust-cli-windows.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## gRPC Dialout Server v${{ github.ref_name }}

            ### Downloads
            | 文件 | 说明 |
            |------|------|
            | `grpc-server-rust-cli-windows.zip` | 纯 Rust CLI 后端（含 proto/tls） |
            | `*.exe` (GUI) | Tauri 桌面应用安装包 (NSIS) |
            | `*.msi` (GUI) | Tauri 桌面应用安装包 (MSI) |

            ### 使用方式（CLI）
            ```powershell
            # 解压后直接运行
            .\grpc-server-rust.exe --port 50051

            # 或指定模式
            .\grpc-server-rust.exe --gpb --port 50052 --tls --log

            # 查看帮助
            .\grpc-server-rust.exe --help

            # 首次运行生成 proto 描述文件
            .\grpc-server-rust.exe --generate
            ```

            **构建 Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            grpc-server-rust-cli-windows.zip
            release-gui/*
